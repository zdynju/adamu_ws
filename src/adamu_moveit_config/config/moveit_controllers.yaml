# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - left_arm_controller
    - right_arm_controller
    - waist_controller
    - dual_arm_controller
    - head_controller
    - conveyor_velocity_controller

  left_arm_controller:
    type: FollowJointTrajectory
    joints:
      - shoulderPitch_Left
      - shoulderRoll_Left
      - shoulderYaw_Left
      - elbow_Left
      - wristYaw_Left
      - wristPitch_Left
      - wristRoll_Left
    action_ns: follow_joint_trajectory
    default: true   
  right_arm_controller:
    type: FollowJointTrajectory
    joints:
      - shoulderPitch_Right
      - shoulderRoll_Right
      - shoulderYaw_Right
      - elbow_Right
      - wristYaw_Right
      - wristPitch_Right
      - wristRoll_Right
    action_ns: follow_joint_trajectory
  waist_controller:
    type: FollowJointTrajectory
    joints:
      - waistYaw
      - waistPitch
      - waistRoll
    action_ns: follow_joint_trajectory
    default: true

  head_controller:
    type: FollowJointTrajectory
    joints:
      - neckYaw
      - neckPitch
    action_ns: follow_joint_trajectory
    default: true

