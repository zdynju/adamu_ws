head:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.0050000000000000001
  kinematics_solver_timeout: 0.0050000000000000001
left_arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.1  # 增加超时时间
  kinematics_solver_attempts: 10 # 增加尝试次数
  mode: global
  position_scale: 1.0
  rotation_scale: 1.0           # 恢复旋转权重平衡
  position_threshold: 0.001
  orientation_threshold: 0.02   # 略微放宽姿态容差
  cost_threshold: 0.001
  minimal_displacement_weight: 0.001
  center_joints_weight: 0.01    # 增加回归中值权重，避开限位
  gd_step_size: 0.0001
  tip_frames:
    - left_hand_tcp
right_arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.1
  kinematics_solver_attempts: 10
  mode: global
  position_scale: 1.0
  rotation_scale: 1.0
  position_threshold: 0.001
  orientation_threshold: 0.02
  cost_threshold: 0.001
  minimal_displacement_weight: 0.001
  center_joints_weight: 0.01
  gd_step_size: 0.0001
  tip_frames:
    - right_hand_tcp
