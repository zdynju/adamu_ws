# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    left_hand_controller:
      type: position_controllers/JointGroupPositionController


    right_hand_controller:
      type: position_controllers/JointGroupPositionController


    waist_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_arm_cartesian_compliance_controller:
      type: cartesian_compliance_controller/CartesianComplianceController

    right_arm_cartesian_compliance_controller:
      type: cartesian_compliance_controller/CartesianComplianceController

    # dual_arm_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController


    head_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    conveyor_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
     # full_body_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    left_fts_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    right_fts_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    # ================= 左手十指 FTS Broadcaster =================
    L_thumb_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    L_index_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    L_middle_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    L_ring_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    L_pinky_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    # ================= 右手十指 FTS Broadcaster =================
    R_thumb_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    R_index_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    R_middle_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    R_ring_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    R_pinky_pad_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

left_fts_broadcaster:
  ros__parameters:
    # 这里的 sensor_name 必须匹配 URDF 中 <sensor name="..."> 的定义
    sensor_name: left_fts_sensor
    # 这里的 frame_id 建议设为手掌 site 的坐标系
    state_interface_names:                    # ← 添加这个！
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: left_palm_fts
    topic_name: wrench

# 🌟 补全：右手力传感器广播员配置
right_fts_broadcaster:
  ros__parameters:
    sensor_name: right_fts_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    topic_name: wrench
    frame_id: right_palm_fts

left_arm_controller:
  ros__parameters:
    joints:
      - shoulderPitch_Left
      - shoulderRoll_Left
      - shoulderYaw_Left
      - elbow_Left
      - wristYaw_Left
      - wristPitch_Left
      - wristRoll_Left
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_arm_controller:
  ros__parameters:
    joints:
      - shoulderPitch_Right
      - shoulderRoll_Right
      - shoulderYaw_Right
      - elbow_Right
      - wristYaw_Right
      - wristPitch_Right
      - wristRoll_Right
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


# 左手群组位置控制器
left_hand_controller:
  ros__parameters:
    joints:
      - L_thumb_MCP_joint1
      - L_thumb_MCP_joint2
      - L_thumb_PIP_joint
      - L_thumb_DIP_joint
      - L_index_MCP_joint
      - L_index_DIP_joint
      - L_middle_MCP_joint
      - L_middle_DIP_joint
      - L_ring_MCP_joint
      - L_ring_DIP_joint
      - L_pinky_MCP_joint
      - L_pinky_DIP_joint

# 右手群组位置控制器
right_hand_controller:
  ros__parameters:
    joints:
      - R_thumb_MCP_joint1
      - R_thumb_MCP_joint2
      - R_thumb_PIP_joint
      - R_thumb_DIP_joint
      - R_index_MCP_joint
      - R_index_DIP_joint
      - R_middle_MCP_joint
      - R_middle_DIP_joint
      - R_ring_MCP_joint
      - R_ring_DIP_joint
      - R_pinky_MCP_joint
      - R_pinky_DIP_joint

waist_controller:
  ros__parameters:
    joints:
      - waistRoll
      - waistPitch
      - waistYaw
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


head_controller:
  ros__parameters:
    joints:
      - neckYaw
      - neckPitch
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

conveyor_velocity_controller:
  ros__parameters:
    joints:
      - conveyor_linear
    command_interfaces:
      - velocity
    state_interfaces:
      - velocity  


  # ================= 左手十指 FTS 参数配置 =================
L_thumb_pad_broadcaster:
  ros__parameters:
    sensor_name: L_thumb_pad_sensor
    frame_id: site_L_thumb_pad

L_index_pad_broadcaster:
  ros__parameters:
    sensor_name: L_index_pad_sensor
    frame_id: site_L_index_pad

L_middle_pad_broadcaster:
  ros__parameters:
    sensor_name: L_middle_pad_sensor
    frame_id: site_L_middle_pad

L_ring_pad_broadcaster:
  ros__parameters:
    sensor_name: L_ring_pad_sensor
    frame_id: site_L_ring_pad

L_pinky_pad_broadcaster:
  ros__parameters:
    sensor_name: L_pinky_pad_sensor
    frame_id: site_L_pinky_pad

# ================= 右手十指 FTS 参数配置 =================
R_thumb_pad_broadcaster:
  ros__parameters:
    sensor_name: R_thumb_pad_sensor
    frame_id: site_R_thumb_pad

R_index_pad_broadcaster:
  ros__parameters:
    sensor_name: R_index_pad_sensor
    frame_id: site_R_index_pad

R_middle_pad_broadcaster:
  ros__parameters:
    sensor_name: R_middle_pad_sensor
    frame_id: site_R_middle_pad

R_ring_pad_broadcaster:
  ros__parameters:
    sensor_name: R_ring_pad_sensor
    frame_id: site_R_ring_pad

R_pinky_pad_broadcaster:
  ros__parameters:
    sensor_name: R_pinky_pad_sensor
    frame_id: site_R_pinky_pad


left_arm_cartesian_compliance_controller:
  ros__parameters:
    end_effector_link: "left_hand_tcp"    # IK 求解末端
    robot_base_link: "torso"              # 基座
    compliance_ref_link: "left_hand_tcp"  # 刚度中心设在掌心，防翘起
    ft_sensor_ref_link: "left_hand_fts"   # 传感器坐标系
    
    joints:
      - shoulderPitch_Left
      - shoulderRoll_Left
      - shoulderYaw_Left
      - elbow_Left
      - wristYaw_Left
      - wristPitch_Left
      - wristRoll_Left

    command_interfaces:
      - position  

    stiffness:  # 刚度：数值越大越硬。先从这个中等偏软的值开始调
        trans_x: 500.0
        trans_y: 20.0
        trans_z: 500.0
        rot_x: 20.0
        rot_y: 20.0
        rot_z: 20.0

    solver:
        error_scale: 0.5
        iterations: 10

    pd_gains:
        trans_x: {p: 0.05, d: 0.005}
        trans_y: {p: 0.03, d: 0.02}
        trans_z: {p: 0.05, d: 0.005}
        rot_x: {p: 1.5}
        rot_y: {p: 1.5}
        rot_z: {p: 1.5}

right_arm_cartesian_compliance_controller:
  ros__parameters:
    end_effector_link: "right_hand_tcp"
    robot_base_link: "torso"
    compliance_ref_link: "right_hand_tcp"
    ft_sensor_ref_link: "right_hand_fts"
    joints:
      - shoulderPitch_Right
      - shoulderRoll_Right
      - shoulderYaw_Right
      - elbow_Right
      - wristYaw_Right
      - wristPitch_Right
      - wristRoll_Right
    command_interfaces:
      - position
    stiffness:
        trans_x: 500.0
        trans_y: 20.0
        trans_z: 500.0
        rot_x: 500.0
        rot_y: 500.0
        rot_z: 500.0
    solver:
        error_scale: 0.5
        iterations: 5
    pd_gains:
        trans_x: {p: 0.05, d: 0.005}
        trans_y: {p: 0.05, d: 0.005}
        trans_z: {p: 0.05, d: 0.005}
        rot_x: {p: 1.5}
        rot_y: {p: 1.5}
        rot_z: {p: 1.5}